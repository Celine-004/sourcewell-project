version: '3.8'
services:
  weaviate:
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http
    image: semitechnologies/weaviate:1.24.1
    ports:
      - "8080:8080"
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none' # We will use sentence-transformers from Python
      ENABLE_MODULES: '' # No additional Weaviate modules needed for prototype
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      # This line maps a local folder on your D: drive to Weaviate's data storage
      # IMPORTANT: Ensure D:\preventive_health_app\weaviate_data exists or Docker will create it
      - weaviate_data:/var/lib/weaviate

volumes:
  weaviate_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: D:\preventive_health_app\weaviate_data